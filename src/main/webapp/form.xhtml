<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:my="jakarta.faces.composite/components">
<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="content">
        <h2>Форма рейса</h2>
        <h:form>
            <h:panelGrid columns="3">
                <h:outputLabel value="Номер рейса (АА-1234):" />
                <h:inputText id="fn" value="#{tripBean.selectedTrip.flightNumber}">
                    <f:validator validatorId="flightNumberValidator" />
                </h:inputText>
                <h:message for="fn" style="color:red" />

                <h:outputLabel value="Откуда:" />
                <h:inputText id="dep" value="#{tripBean.selectedTrip.departure}" required="true" />
                <h:message for="dep" style="color:red" />

                <h:outputLabel value="Куда:" />
                <h:inputText id="dest" value="#{tripBean.selectedTrip.destination}" required="true" />
                <h:message for="dest" style="color:red" />

                <h:outputLabel value="Тип транспорта:" />
                <h:selectOneMenu id="type" value="#{tripBean.selectedTrip.transportType}" converter="transportTypeConverter">
                    <f:selectItems value="#{tripBean.transportTypes}" var="t" itemValue="#{t}" itemLabel="#{t.displayName}" />
                </h:selectOneMenu>
                <h:message for="type" style="color:red" />

                <my:numberInput value="#{tripBean.selectedTrip.price}" label="Цена" />
                <h:panelGroup/>

                <my:numberInput value="#{tripBean.selectedTrip.seats}" label="Места" />
                <h:panelGroup/>
            </h:panelGrid>
            <br/>
            <h:commandButton value="Сохранить" action="#{tripBean.save}" />
            <h:commandButton value="Отмена" action="#{tripBean.cancel}" immediate="true" />
        </h:form>
    </ui:define>
</ui:composition>
</html>
